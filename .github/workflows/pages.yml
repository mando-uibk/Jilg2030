# GitHub Pages über Actions – zuverlässiger als nur „Branch deploy“
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Ein Bundle: Passwort (Zeile 1) + gate-Logik – eine Datei, kein zweiter Request der leer bleibt
      # Secret muss exakt SITE_PASSWORD heißen. Zusätzlich: Environment github-pages → dort Secret anlegen,
      # falls Repository-Secret im Job nicht ankommt.
      - name: Build gate-built.js (SITE_PASSWORD → eine Datei)
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          node << 'NODEEOF'
          const fs = require('fs');
          const p = process.env.SITE_PASSWORD || '';
          const gate = fs.readFileSync('js/gate.js', 'utf8');
          const out = 'window.__JILG_SITE_PASSWORD__=' + JSON.stringify(p) + ';\n' + gate;
          fs.writeFileSync('js/gate-built.js', out);
          const empty = p.length === 0;
          console.log('SITE_PASSWORD length:', p.length, empty ? '(GATE AUS – leer)' : '(GATE AN)');
          if (empty) console.log('::warning::SITE_PASSWORD ist leer – Gate ist deaktiviert. Secret SITE_PASSWORD unter Settings → Secrets → Actions setzen und Workflow neu laufen lassen.');
          NODEEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
