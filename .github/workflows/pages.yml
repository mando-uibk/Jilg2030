# GitHub Pages über Actions – zuverlässiger als nur „Branch deploy“
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Passwort-Gate: NUR Repository-Secret mit exaktem Namen SITE_PASSWORD (Actions → Secrets)
      # Nach dem Anlegen des Secrets einen neuen Deploy auslösen (Push oder Actions → Deploy Pages → Run workflow)
      - name: Inject site password for gate
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          mkdir -p js
          node -e "const fs=require('fs');const p=process.env.SITE_PASSWORD||'';fs.writeFileSync('js/gate-secret.js','window.__JILG_SITE_PASSWORD__='+JSON.stringify(p)+';');"
          # Ohne Secret bleibt Datei leer → kein Gate. Mit Secret muss die Datei länger sein als nur window...="";
          wc -c js/gate-secret.js || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
